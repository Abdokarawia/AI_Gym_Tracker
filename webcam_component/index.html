<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0d0f12;font-family:sans-serif;color:#e8eaf0;overflow:hidden;}
  #inputVideo{display:none;}
  #outputCanvas{width:100%;border-radius:12px;display:none;border:2px solid #1e2229;background:#13161c;}
  #placeholder{
    width:100%;height:360px;border-radius:12px;border:2px dashed #2a2f3a;
    background:#13161c;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;color:#4b5563;font-size:.9rem;
  }
  #controls{display:flex;gap:10px;margin-top:10px;justify-content:center;}
  button{padding:10px 28px;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;border:none;transition:all .2s;}
  #startBtn{background:#39ff7e;color:#0d0f12;}
  #startBtn:hover{background:#2de070;}
  #stopBtn{background:#1e2229;color:#e8eaf0;border:1px solid #2a2f3a;display:none;}
  #statusBar{margin-top:8px;text-align:center;font-size:.78rem;color:#4b5563;min-height:20px;}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#39ff7e;margin-right:5px;animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  #relWrap{position:relative;}
  #fpsTag{display:none;position:absolute;top:10px;right:14px;background:rgba(13,15,18,.85);border:1px solid #1e2229;border-radius:6px;padding:3px 8px;font-size:.7rem;color:#f59e0b;font-weight:700;}
</style>
</head>
<body>
<div id="relWrap">
  <div id="placeholder">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#4b5563" stroke-width="1.5">
      <path d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
    </svg>
    <span>Click <b style="color:#39ff7e">Start Camera</b> to begin</span>
    <span style="font-size:.75rem;color:#374151">Allow camera access when prompted</span>
  </div>
  <canvas id="outputCanvas"></canvas>
  <div id="fpsTag">– FPS</div>
</div>
<div id="controls">
  <button id="startBtn" onclick="startCam()">&#9654; Start Camera</button>
  <button id="stopBtn"  onclick="stopCam()">&#9632; Stop</button>
</div>
<div id="statusBar">Ready</div>
<video id="inputVideo" autoplay playsinline muted></video>

<script>
(function(){
  var video      = document.getElementById('inputVideo');
  var canvas     = document.getElementById('outputCanvas');
  var ctx        = canvas.getContext('2d');
  var placeholder= document.getElementById('placeholder');
  var statusEl   = document.getElementById('statusBar');
  var fpsTag     = document.getElementById('fpsTag');
  var stream=null, rafHandle=null, running=false, lastSentMs=0;
  var INTERVAL=120, fpsCount=0, fpsLast=performance.now();

  // Receive annotated frame from Python via streamlit:render event
  document.addEventListener('streamlit:render', function(e){
    var ann = e && e.detail && e.detail.args && e.detail.args.annotated;
    if (!ann || ann.length < 100) return;
    var img = new Image();
    img.onload = function(){
      canvas.width  = img.naturalWidth  || 640;
      canvas.height = img.naturalHeight || 480;
      ctx.drawImage(img, 0, 0);
      fpsCount++;
      var now = performance.now();
      if(now - fpsLast >= 2000){
        fpsTag.textContent = (fpsCount/((now-fpsLast)/1000)).toFixed(1)+' FPS';
        fpsCount=0; fpsLast=now;
      }
    };
    img.src = ann;
  });

  function captureLoop(){
    if(!running) return;
    rafHandle = requestAnimationFrame(captureLoop);
    var now = performance.now();
    if(now - lastSentMs < INTERVAL) return;
    if(video.readyState < 2) return;
    lastSentMs = now;
    var off = document.createElement('canvas');
    off.width = video.videoWidth || 640;
    off.height= video.videoHeight|| 480;
    off.getContext('2d').drawImage(video, 0, 0);
    Streamlit.setComponentValue(off.toDataURL('image/jpeg', 0.72));
  }

  window.startCam = async function(){
    try{
      statusEl.textContent = 'Requesting camera…';
      stream = await navigator.mediaDevices.getUserMedia(
        {video:{width:{ideal:640},height:{ideal:480},facingMode:'user'},audio:false});
      video.srcObject = stream;
      await video.play();
      placeholder.style.display='none';
      canvas.style.display='block';
      fpsTag.style.display='block';
      document.getElementById('startBtn').style.display='none';
      document.getElementById('stopBtn').style.display='inline-block';
      running=true;
      statusEl.innerHTML='<span class="dot"></span>Live — AI processing…';
      captureLoop();
    }catch(e){
      statusEl.textContent='Camera error: '+e.message;
    }
  };

  window.stopCam = function(){
    running=false;
    if(rafHandle) cancelAnimationFrame(rafHandle);
    if(stream) stream.getTracks().forEach(function(t){t.stop();});
    stream=null;
    placeholder.style.display='flex';
    canvas.style.display='none';
    fpsTag.style.display='none';
    document.getElementById('startBtn').style.display='inline-block';
    document.getElementById('stopBtn').style.display='none';
    statusEl.textContent='Stopped.';
    Streamlit.setComponentValue(null);
  };

  // REQUIRED: tell Streamlit the component is ready and set iframe height
  Streamlit.setFrameHeight(560);
  Streamlit.setComponentReady();
})();
</script>
</body>
</html>
